<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Favourite Campaigns - Helping Hands</title>

  <link rel="stylesheet" href="favoriteCampaign.css" />
</head>

<body>

  <!-- HEADER -->
  <header class="topbar">
    <div class="header-left">
      <a href="homepage.html" class="brand-logo">
        <svg class="brand-icon" viewBox="0 0 64 64" aria-hidden="true">
          <path d="M32 18C28 10 15 10 15 23C15 33 32 43 32 43C32 43 49 33 49 23C49 10 36 10 32 18Z" />
          <path d="M15 38C20 39 25 43 29 48" />
          <path d="M49 38C44 39 39 43 35 48" />
          <path d="M13 36C8 39 9 49 19 52C24 54 29 55 32 58" />
          <path d="M51 36C56 39 55 49 45 52C40 54 35 55 32 58" />
        </svg>

        <div class="brand-text">
          <div class="brand-title">Helping Hands</div>
          <div class="brand-subtitle">Fundraising Platform</div>
        </div>
      </a>
    </div>

    <div class="header-center">
      <div class="header-search">
        <span>🔍</span>
        <input type="text" placeholder="Search campaigns" id="headerSearchInput" />
      </div>
    </div>

    <nav class="header-right">
      <a href="homepage.html" class="nav-link">Home</a>

      <!-- DONEE DROPDOWN -->
      <div class="nav-dropdown" id="donateDropdown">
        <button class="nav-link active nav-button" id="donateMenuBtn" type="button">
          Donee <span class="small-arrow">▼</span>
        </button>

        <div class="nav-dropdown-menu">
          <a href="browseCampaign.html" class="nav-dropdown-item">Browse Campaigns</a>
          <a href="myDonation.html" class="nav-dropdown-item">My Donations</a>
        </div>
      </div>

      <!-- FUNDRAISE DROPDOWN -->
      <div class="nav-dropdown" id="fundraiseDropdown">
        <button class="nav-link nav-button" id="fundraiseMenuBtn" type="button">
          Fundraise <span class="small-arrow">▼</span>
        </button>

        <div class="nav-dropdown-menu">
          <a href="startCampaign.html" class="nav-dropdown-item">Start a Campaign</a>
          <a href="myCampaign.html" class="nav-dropdown-item">My Campaigns</a>
        </div>
      </div>

      <!-- ABOUT DROPDOWN -->
      <div class="nav-dropdown" id="aboutDropdown">
        <button class="nav-link nav-button" id="aboutMenuBtn" type="button">
          About <span class="small-arrow">▼</span>
        </button>

        <div class="nav-dropdown-menu">
          <a href="aboutUs.html" class="nav-dropdown-item">About Us</a>
        </div>
      </div>

      <div class="profile-divider"></div>

      <div class="profile-box">
        <div class="avatar"></div>
        <div class="profile-name">tc <span>▲</span></div>
      </div>
    </nav>
  </header>

  <!-- MAIN -->
  <main class="page-wrap">

    <section>
      <div class="campaign-tabs">
        <a href="browseCampaign.html" class="campaign-tab">CAMPAIGNS</a>
        <button class="campaign-tab active" type="button">FAVORITE</button>
      </div>

      <div class="campaign-area">
        <div class="filter-row">
          <div class="filter-left">
            <span class="filter-text">Filter by</span>

            <div class="chip-dropdown" id="causesDropdown">
              <button class="chip" id="causesBtn" type="button">
                Causes ▼
              </button>

              <div class="chip-menu">
                <button class="chip-item" data-category="Medical" type="button">Medical</button>
                <button class="chip-item" data-category="Education" type="button">Education</button>
                <button class="chip-item" data-category="Emergency" type="button">Emergency</button>
                <button class="chip-item" data-category="Animals" type="button">Animals</button>
                <button class="chip-item" data-category="Community" type="button">Community</button>
                <button class="chip-item" data-category="Environment" type="button">Environment</button>
                <button class="chip-item" data-category="Others" type="button">Others</button>
              </div>
            </div>
          </div>

          <div class="filter-right">
            <span class="results-text">Results</span>
            <button class="result-chip" type="button">30 ▼</button>
          </div>
        </div>

        <div class="explore-text" id="favoriteCountText">
          Explore favorite campaigns
        </div>

        <div class="empty-message" id="emptyBox">
          No favorite campaigns yet
        </div>

        <div class="campaign-grid" id="favoriteGrid"></div>
      </div>
    </section>

  </main>

  <!-- FOOTER SAME AS HOMEPAGE -->
  <footer class="site-footer">
    <div class="footer-col">
      <h4>Donee</h4>
      <a href="browseCampaign.html">Browse Campaigns</a>
      <a href="myDonation.html">My Donations</a>
    </div>

    <div class="footer-col">
      <h4>Fundraise</h4>
      <a href="startCampaign.html">Start a Campaign</a>
      <a href="myCampaign.html">My Campaigns</a>
    </div>

    <div class="footer-col">
      <h4>About</h4>
      <a href="aboutUs.html">About Us</a>
    </div>
  </footer>

  <script src="../controller/favoriteCampaignController.js"></script>
</body>
</html>
