<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Login</title>

  <link rel="stylesheet" href="/style/login.css" />
</head>

<body>
  <div class="app-bg">
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>
    <div class="bg-shape shape-3"></div>
    <div class="bg-shape shape-4"></div>

    <section class="screen active">
      <div class="card signin-card">
        <h1 class="title center">Welcome</h1>

        <p class="subtitle center">
          Sign in to Helping Hands or sign up to continue.
        </p>

        <div class="field-group">
          <label for="emailInput" class="field-label">Email Address</label>

          <input
            id="emailInput"
            class="input"
            type="text"
            placeholder="example@email.com"
            autocomplete="email"
          />

          <p id="emailError" class="error-text hidden"></p>
        </div>

        <div class="field-group">
          <div class="password-wrap">
            <input
              id="passwordInput"
              class="input normal-border"
              type="password"
              placeholder="Password"
              autocomplete="current-password"
            />

            <button id="togglePassword" class="eye-btn" type="button">👁</button>
          </div>

          <p id="passwordError" class="error-text hidden"></p>
        </div>

        <a href="#" class="forgot-link">Forgot your password?</a>

        <button id="signInBtn" class="primary-btn" type="button">
          Sign in
        </button>
      </div>
    </section>
  </div>

  <script src="/LoginPage.js"></script>
</body>
</html>
