<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Start a Campaign</title>
  <link rel="stylesheet" href="start-campaign.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>

  <!-- Navigation -->
  <header class="navbar">
    <div class="logo">logo</div>

    <div class="search-box">
      <i class="fa fa-search"></i>
      <input type="text" placeholder="Search" />
    </div>

    <nav class="nav-links">
      <a href="#">Home</a>
      <div class="dropdown">
        <a href="#">Donate <i class="fa fa-caret-down"></i></a>
      </div>
      <div class="dropdown">
        <a href="#">Fundraise <i class="fa fa-caret-down"></i></a>
      </div>
      <a href="#">About</a>
    </nav>

    <div class="profile">
      <img src="https://via.placeholder.com/30" alt="profile">
      <span><i class="fa fa-caret-down"></i></span>
    </div>
  </header>

  <!-- Main Content -->
  <main class="campaign-container">
    <h2>Start a Fundraising Campaign</h2>
    <p>Share your story and start receiving donations</p>

    <form class="campaign-form">
      <label>Name:</label>
      <input type="text" />

      <label>E-mail or Phone Number:</label>
      <input type="text" />

      <label>Campaign Title:</label>
      <input type="text" />

      <label>Category <i class="fa fa-caret-down"></i></label>
        <select>
        <option selected disabled>Category</option>
        <option>Medical</option>
        <option>Education</option>
        <option>Emergency</option>
        <option>Animals</option>
        <option>Community</option>
        <option>Environment</option>
        <option>Others:</option>
        </select>

      <label>Fundraising Goal ($):</label>
      <div class="goal-input">
        <span>$</span>
        <input type="number" placeholder="0.00" />
      </div>

      <label>Duration:</label>
      <div class="duration-row">
        <div class="date-box">
          <span class="date-title">Start</span>
          <input type="date" />
        </div>
        <div class="date-box">
          <span class="date-title">End</span>
          <input type="date" />
        </div>
      </div>

      <label>Upload Image: <i class="fa fa-upload"></i></label>
      <input type="file" class="file-input" />

      <label>Description:</label>
      <textarea></textarea>
    </form>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-column">
      <h4>Donate</h4>
      <ul>
        <li>Browse Campaigns</li>
        <li>My Donations</li>
      </ul>
    </div>

    <div class="footer-column">
      <h4>Fundraise</h4>
      <ul>
        <li>Start a Campaign</li>
        <li>My Campaigns</li>
      </ul>
    </div>

    <div class="footer-column">
      <h4>About</h4>
      <ul>
        <li>About Us</li>
        <li>Contact Us</li>
        <li>FAQ</li>
      </ul>
    </div>
  </footer>

</body>
</html>
